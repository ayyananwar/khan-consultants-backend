services:
  - type: web
    name: khan-consultants-api
    env: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Kolkata
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://khanconsultants.in,https://www.khanconsultants.in,https://*.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: khan_data
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: khan_data
    plan: free
    region: singapore
    databaseName: khan_data
    user: khan_data_user
